version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 15 (App Router)
  - ui_library: Tailwind CSS
  - other: Anthropic Claude API
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Main page. A 3-tier content matrix is always visible on load — either a built-in sample or last AI-generated result from localStorage.
features:
  - name: Sample Matrix on First Load
    description: A hardcoded sample 3-tier content matrix is shown on every fresh page load when no localStorage entry exists. All tier headings and card fields are always visible without any user action.
    files:
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Page loads and immediately shows Tier 1 heading with data-testid tier-heading-1
      - Page loads and immediately shows Tier 2 heading with data-testid tier-heading-2
      - Page loads and immediately shows Tier 3 heading with data-testid tier-heading-3
      - Each card shows card-title, card-script, card-format, card-channel, card-angle, card-goal
      - Format badge text starts with "Format:" prefix
      - Channel badge text starts with "Channel:" prefix
      - Angle badge text starts with "Angle:" prefix
      - Goal line text starts with "Goal:" prefix
      - A banner at top of matrix column says "Sample matrix — fill in the form and click Generate to create your own"
    api_calls: []
    auth_required: false
  - name: Generate Content Matrix
    description: User fills 4 required fields and clicks Generate. 30-second timeout enforced. Client-side validation runs before API call. On success matrix updates and is saved to localStorage.
    files:
      - app/page.tsx
      - app/api/generate/route.ts
      - lib/fetchWithTimeout.js
      - lib/validateIntake.js
      - lib/errorMessages.js
    entry_route: /
    user_interactions:
      - Fill Product Name input required field
      - Fill Product Description textarea required field
      - Fill Target Users textarea required field
      - Fill Core Features textarea required field
      - Click Generate Content Matrix button
      - If any field is empty see inline error below that field with data-testid error-productName or error-description or error-targetUsers or error-coreFeatures
      - See 3 animated loading skeleton cards while waiting for API
      - On success matrix updates and sample banner disappears
      - On error see titled error banner with data-testid error-timeout or error-network or error-api or error-unknown and a Retry button
    api_calls:
      - method: POST
        endpoint: /api/generate
    auth_required: false
  - name: Persisted Matrix Restore
    description: After successful generation result is saved to localStorage. On next page load saved matrix is restored automatically with no loading state.
    files:
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Generate matrix successfully
      - Reload page
      - Matrix is immediately visible with no loading skeleton and no sample banner
      - All tier headings and card fields are present
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Sample matrix is hardcoded and unrelated to the user's actual product until they generate
    location: app/page.tsx
    impact: Low — sample banner clearly labels it as a sample
